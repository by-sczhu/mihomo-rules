name: Build category-pt.mrs

on:
  workflow_dispatch:
  push:
    paths:
      - "rules/category-pt.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download Mihomo
        run: |
          URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha \
            | grep browser_download_url \
            | grep linux-amd64-compatible.gz \
            | head -1 \
            | cut -d '"' -f4)

          wget -O mihomo.gz "$URL"
          gunzip mihomo.gz

          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

          mihomo -v

      - name: Build MRS
        run: |
          mihomo convert-ruleset \
            domain \
            text \
            rules/category-pt.txt \
            rules/category-pt.mrs

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/category-pt.mrs

          if ! git diff --cached --quiet; then
            git commit -m "Update category-pt.mrs"
            git push
          fi
