name: Build MRS

on:
  workflow_dispatch:
  push:
    paths:
      - "rules/category-pt.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build MRS
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/rules:/rules \
            metacubex/mihomo:latest \
            convert-ruleset \
            domain \
            text \
            /rules/category-pt.txt \
            /rules/category-pt.mrs

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/category-pt.mrs

          if ! git diff --cached --quiet; then
            git commit -m "Update category-pt.mrs"
            git push
          fi
