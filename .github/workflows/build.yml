name: Build RuleSet

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'rule/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mihomo
        run: |
          wget -O mihomo.gz \
          https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64-compatible.gz

          gunzip mihomo.gz
          chmod +x mihomo

      - name: Convert RuleSet
        run: |

          mkdir -p build
          mkdir -p output

          for file in rule/*.list
          do

            name=$(basename "$file" .list)

            sed 's/^+\.//g;s/^/DOMAIN-SUFFIX,/' "$file" \
            > "build/${name}.txt"

            ./mihomo convert-ruleset domain text \
            "build/${name}.txt" \
            "output/${name}.mrs"

          done

      - name: Generate Tag
        id: tag
        run: |
          echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: output/*
