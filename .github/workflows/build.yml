name: Build PT Ruleset

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mihomo
        run: |
          wget -O mihomo.gz \
          https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64-compatible.gz

          gunzip mihomo.gz
          chmod +x mihomo

      - name: Build workspace
        run: |
          mkdir -p build output

      - name: Convert list → rule text
        run: |
          sed 's/^+\.//g;s/^/DOMAIN-SUFFIX,/' rule/category-pt.list > build/category-pt.txt

      - name: Build MRS
        run: |
          ./mihomo convert-ruleset domain text \
          build/category-pt.txt \
          output/category-pt.mrs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruleset
          path: output/category-pt.mrs

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: output/category-pt.mrs
