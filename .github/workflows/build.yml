name: Build TXT TO MRS

on:
workflow_dispatch:
push:
paths:
- "rules/*.txt"

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v5

  - name: Convert all TXT to MRS
    run: |
      set -e

      for file in rules/*.txt; do
        [ -f "$file" ] || continue

        name=$(basename "$file" .txt)

        echo "Converting $file -> rules/${name}.mrs"

        docker run --rm \
          -v "${{ github.workspace }}/rules:/rules" \
          metacubex/mihomo:latest \
          convert-ruleset \
          domain \
          text \
          "/rules/${name}.txt" \
          "/rules/${name}.mrs"
      done

  - name: Commit changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add rules/*.mrs

      if ! git diff --cached --quiet; then
        git commit -m "Update MRS rules"
        git push
      else
        echo "No changes"
      fi
