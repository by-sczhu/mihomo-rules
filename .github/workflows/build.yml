name: Build All TO MRS

on:
  workflow_dispatch: # 允许手动触发
  push:
    paths:
      - "rules/*.txt" # 只要 rules 目录下的任意 txt 文件有变动就触发

permissions:
  contents: write # 赋予工作流向仓库推送代码的权限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build MRS
        run: |
          # 遍历当前工作区 rules 目录下的所有 txt 文件
          for file in ${{ github.workspace }}/rules/*.txt; do
            # 确保文件确实存在，防止因目录为空或匹配不到导致循环报错
            [ -e "$file" ] || continue
            
            # 提取纯文件名（例如从 "/path/to/rules/self-built.txt" 提取出 "self-built"）
            filename=$(basename "$file" .txt)
            
            echo "=================================================="
            echo "正在转换: $filename.txt -> $filename.mrs"
            echo "=================================================="
            
            # 使用 --entrypoint 覆盖容器默认启动行为，使其作为纯工具命令运行
            docker run --rm \
              -v ${{ github.workspace }}/rules:/rules \
              --entrypoint /mihomo \
              metacubex/mihomo:latest \
              convert-ruleset domain text /rules/$filename.txt /rules/$filename.mrs
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 暂存所有新生成的二进制 mrs 文件
          git add rules/*.mrs

          # 检查是否有文件变动，如果有则提交并推送
          if ! git diff --cached --quiet; then
            git commit -m "Automated update of all binary rulesets (*.mrs)"
            git push
          else
            echo "未检测到规则文件变动，跳过自动提交。"
          fi
