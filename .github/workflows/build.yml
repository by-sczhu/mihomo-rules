name: Build all MRS

on:
  workflow_dispatch:
  push:
    paths:
      - "rules/*.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build MRS (batch safe)
        run: |
          set -e

          for file in rules/*.txt; do
            [ -e "$file" ] || continue

            out="${file%.txt}.mrs"

            echo "Converting $file → $out"

            docker run --rm \
              -v ${{ github.workspace }}/rules:/rules \
              metacubex/mihomo:latest \
              convert-ruleset \
              domain \
              text \
              "/$file" \
              "/${out#rules/}"

          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/*.mrs

          if ! git diff --cached --quiet; then
            git commit -m "auto: update mrs rules"
            git push
          fi
