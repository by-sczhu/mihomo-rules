name: Build All TO MRS

on:
  workflow_dispatch:
  push:
    paths:
      - "rules/*.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build MRS
        run: |
          # 遍历当前工作区 rules 目录下的所有 txt 文件
          for file in ${{ github.workspace }}/rules/*.txt; do
            # 确保文件确实存在
            [ -e "$file" ] || continue
            
            filename=$(basename "$file" .txt)
            
            echo "=================================================="
            echo "正在检查并转换: $filename.txt"
            echo "=================================================="
            
            # 过滤掉注释行（# 或 //）以及纯空格/空行，统计有效规则行数
            valid_lines=$(grep -v -E '^(#|\/\/|\s*$)' "$file" | wc -l)
            
            if [ "$valid_lines" -eq 0 ]; then
              echo "⚠️ 警告: $filename.txt 中未检测到有效规则行（可能为空或全是注释）。"
              echo "为了防止 Mihomo 内核崩溃 (panic: empty rule)，将跳过此文件的转换。"
              continue
            fi
            
            echo "有效规则行数: $valid_lines 行，开始转换..."
            
            # 使用 --entrypoint 覆盖容器默认启动行为
            docker run --rm \
              -v ${{ github.workspace }}/rules:/rules \
              --entrypoint /mihomo \
              metacubex/mihomo:latest \
              convert-ruleset domain text /rules/$filename.txt /rules/$filename.mrs
          done

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 暂存所有新生成的二进制 mrs 文件
          git add rules/*.mrs

          # 检查是否有文件变动，如果有则提交并推送
          if ! git diff --cached --quiet; then
            git commit -m "Automated update of all binary rulesets (*.mrs)"
            git push
          else
            echo "未检测到规则文件变动，跳过自动提交。"
          fi
