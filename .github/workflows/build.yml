name: Build MRS rulesets

on:
  workflow_dispatch:
  push:
    paths:
      - "rules/**/*.txt"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Mihomo
        run: |
          VERSION=$(curl -fsSL \
            https://github.com/MetaCubeX/mihomo/releases/download/v1.20.4/version.txt)

          curl -fsSL \
            "https://github.com/MetaCubeX/mihomo/releases/download/v1.20.4/mihomo-linux-amd64-compatible-v1.20.4.gz" \
            | gunzip -c > mihomo

          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/

          mihomo -v

      - name: Convert all txt → mrs
        run: |
          set -e

          echo "Scanning rules directory..."

          find rules -type f -name "*.txt" | while read file; do

            # 输出文件名
            out="${file%.txt}.mrs"

            echo "Converting: $file -> $out"

            # 自动判断内容类型（domain / ipcidr fallback domain）
            if grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$file"; then
              TYPE="ipcidr"
            else
              TYPE="domain"
            fi

            mihomo convert-ruleset \
              $TYPE text \
              "$file" \
              "$out"

          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/*.mrs

          if ! git diff --cached --quiet; then
            git commit -m "auto: build all mrs rules"
            git push
          fi
