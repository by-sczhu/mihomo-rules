name: Build Mihomo Ruleset

on:
  workflow_dispatch:
  push:
    paths:
      - 'rule/**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build workspace
        run: |
          mkdir -p build
          mkdir -p output

      - name: Convert .list → .txt (DOMAIN-SUFFIX)
        run: |
          for file in rule/*.list; do

            name=$(basename "$file" .list)

            # 转换 Surge 风格 +.xxx → DOMAIN-SUFFIX,xxx
            sed 's/^+\.//g;s/^/DOMAIN-SUFFIX,/' "$file" \
              > "build/${name}.txt"

          done

      - name: Install mihomo-ruleset compiler
        run: |
          python -m pip install --upgrade pip

          pip install git+https://github.com/MetaCubeX/mihomo-ruleset.git

      - name: Build MRS files
        run: |
          for file in build/*.txt; do

            name=$(basename "$file" .txt)

            python - << 'EOF'
import sys
from pathlib import Path
from mihomo_ruleset import RuleSet

input_file = Path("${file}")
output_file = Path("output/${name}.mrs")

rules = []
for line in input_file.read_text().splitlines():
    if line.strip():
        rules.append(line.strip())

rs = RuleSet("domain")
rs.add_rules(rules)
rs.save(output_file)
EOF

          done

      - name: Create Release Tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: output/*.mrs
