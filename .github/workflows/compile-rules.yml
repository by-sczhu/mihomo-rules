name: Compile Mihomo Rules to MRS

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master
    paths:
      - 'rules/*.list' # 仅当 rules 目录下的 .list 文件变动时触发
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Mihomo Alpha via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Using GitHub CLI to download latest alpha with pattern matching..."
          
          # 使用官方 CLI 模糊匹配下载包含 linux-amd64 且以 .gz 结尾的文件，完美避开固定链接失效和 API 报错问题
          gh release download meta-alpha \
            --repo MetaCubeX/mihomo \
            --pattern "*linux-amd64*.gz" \
            --clobber
          
          # 重命名下载下来的压缩包（因为带哈希，用模糊匹配找到它并重命名）
          mv *linux-amd64*.gz mihomo.gz
          
          # 解压并赋予权限
          echo "Extracting Mihomo kernel..."
          gunzip -c mihomo.gz > mihomo
          rm -f mihomo.gz
          chmod +x mihomo
          
          # 验证内核是否可用
          ./mihomo -v

      - name: Compile .list to .mrs
        run: |
          mkdir -p rules
          for file in rules/*.list; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .list)
            echo "Compiling $file ..."
            
            if [[ "${filename,,}" == *"ip"* ]]; then
              ./mihomo rule-set compile --type ipcidr "$file" "rules/$filename.mrs"
            else
              ./mihomo rule-set compile --type domain "$file" "rules/$filename.mrs"
            fi
          done

      - name: Auto Commit and Push MRS Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-compile rules to mrs [skip ci]"
          file_pattern: 'rules/*.mrs'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
