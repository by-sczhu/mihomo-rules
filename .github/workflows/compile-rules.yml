name: Compile Mihomo Rules

on:
  # 允许手动触发执行
  workflow_dispatch:
  # 当指定规则文件发生变动时自动触发
  push:
    paths:
      - 'mihomo-rules/rule/category-pt.list'

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Mihomo Core
        run: |
          echo "Fetching latest Mihomo alpha release..."
          # 获取最新的 Mihomo Alpha 下载链接（包含 compile 功能）
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases | jq -r '[.[] | select(.tag_name | contains("alpha"))][0].assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            # 如果 alpha 获取失败，回退到 regular release
            DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | head -n 1)
          fi
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o mihomo.tar.gz "$DOWNLOAD_URL"
          
          echo "Extracting Mihomo core..."
          # 解压并重命名为可执行文件
          if tar -tzf mihomo.tar.gz >/dev/null 2>&1; then
            tar -xzf mihomo.tar.gz
            mv mihomo-linux-amd64* mihomo 2>/dev/null || mv mihomo-* mihomo 2>/dev/null || true
          else
            # 部分 release 可能是 gzip 或直接二进制，做个兼容处理
            gunzip -c mihomo.tar.gz > mihomo 2>/dev/null || mv mihomo.tar.gz mihomo
          fi
          
          chmod +x mihomo
          ./mihomo -v

      - name: Compile Rule List to MRS
        run: |
          INPUT_FILE="mihomo-rules/rule/category-pt.list"
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          # 确保输出目录存在
          mkdir -p $(dirname "$OUTPUT_FILE")
          
          if [ -f "$INPUT_FILE" ]; then
            echo "Compiling $INPUT_FILE to $OUTPUT_FILE..."
            # 使用 mihomo rule-set compile 命令转换
            ./mihomo rule-set compile "$INPUT_FILE" "$OUTPUT_FILE"
            echo "💡 Compilation successful!"
          else
            echo "❌ Error: Input file $INPUT_FILE not found!"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          # 检查文件是否有实际变动，避免无意义的空提交
          if git status --porcelain "$OUTPUT_FILE" | grep -q 'M\|A'; then
            git add "$OUTPUT_FILE"
            git commit -m "chore: auto-compile category-pt.mrs [skip ci]"
            git push
            echo "🚀 Updated MRS rule pushed to repository."
          else
            echo "ℹ️ No changes detected in the compiled MRS file. Skipping push."
          fi
