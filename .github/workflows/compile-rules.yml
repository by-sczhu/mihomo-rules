name: Compile Mihomo Rules to MRS

on:
  push:
    branches:
      - main  # 触发分支，根据你的主分支名称（main/master）修改
    paths:
      - 'rules/*.list' # 仅当 rules 目录下的 .list 文件变动时触发
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录以便提交

      - name: Download Mihomo Alpha
        run: |
          # 获取最新的 Mihomo Linux amd64 压缩包（注意：mrs 编译功能通常在 alpha 或者是新版内核中）
          # 这里直接下载官方最新的 alpha 版本以确保支持最新特性
          URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases | jq -r '[.[] | select(.tag_name | contains("alpha"))][0].assets[] | select(.name | contains("linux-amd64")) | .browser_download_url')
          
          # 如果 alpha 获取失败，回退到最新 release
          if [ -z "$URL" ]; then
            URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url')
          fi
          
          echo "Downloading from: $URL"
          curl -L "$URL" -o mihomo.gz
          gunzip -c mihomo.gz > mihomo
          chmod +x mihomo
          ./mihomo -v

      - name: Compile .list to .mrs
        run: |
          # 创建存放 mrs 文件的目录（如果不存在的话）
          mkdir -p rules
          
          # 遍历 rules 目录下的所有 .list 文件
          for file in rules/*.list; do
            # 确保文件存在（防止没有匹配到文件时报错）
            [ -e "$file" ] || continue
            
            filename=$(basename "$file" .list)
            echo "Compiling $file -> rules/$filename.mrs"
            
            # 使用 mihomo 命令行进行转换
            # 这里的规则类型默认为 domain，如果你有 ip 规则，可以根据文件名作判断
            if [[ "$filename" == *"ip"* ]]; then
              ./mihomo rule-set compile --type ipcidr "$file" "rules/$filename.mrs"
            else
              ./mihomo rule-set compile --type domain "$file" "rules/$filename.mrs"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有文件变动
          if [ -n "$(git status --porcelain rules/*.mrs)" ]; then
            git add rules/*.mrs
            git commit -m "chore: auto-compile rules to mrs [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
