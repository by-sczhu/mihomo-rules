name: Compile Mihomo Rules

on:
  workflow_dispatch:
  push:
    # 只要任何地方的 category-pt.list 变动都会触发
    paths:
      - '**category-pt.list'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Mihomo Core
        run: |
          echo "🚀 正在下载固定版本的稳定 Mihomo 内核..."
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz"
          
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          gunzip -f mihomo.gz
          mv mihomo-linux-amd64* mihomo 2>/dev/null || true
          chmod +x mihomo
          
          echo "----------------------------------------"
          echo "验证 Mihomo 内核是否工作正常："
          ./mihomo -v
          echo "----------------------------------------"

      - name: Preprocess and Compile Rules
        run: |
          echo "🔍 正在自动寻找 category-pt.list 文件位置..."
          
          # 自动在仓库中寻找 category-pt.list 的实际绝对路径
          REAL_PATH=$(find . -name "category-pt.list" -print -quit)
          
          if [ -z "$REAL_PATH" ]; then
            echo "❌ 严重错误: 在整个仓库中都没有找到 category-pt.list 文件！"
            echo "当前仓库内的文件树结构如下："
            find . -maxdepth 3 -not -path '*/.*'
            exit 1
          fi
          
          echo "✅ 成功找到目标文件: $REAL_PATH"
          
          # 根据找到的实际路径动态定义输入、临时和输出文件
          INPUT_FILE="$REAL_PATH"
          TEMP_FILE="${REAL_PATH%.list}.clean.list"
          OUTPUT_FILE="${REAL_PATH%.list}.mrs"
          
          echo "🧹 启动严格域名过滤与清洗..."
          awk '
          NF && !/^#/ {
              gsub(/\r/, "");
              sub(/^[[:space:]]*/, "");
              sub(/^(DOMAIN-SUFFIX|DOMAIN|DOMAIN-KEYWORD)[,.[[:space:]]]*/, "");
              sub(/^\+/, "");
              sub(/^\./, "");
              if ($0 != "") {
                  print $0
              }
          }' "$INPUT_FILE" | grep -Ei '^[a-z0-9][-a-z0-9]*(\.[a-z0-9][-a-z0-9]*)+$' > "$TEMP_FILE" || true

          if [ -not -s "$TEMP_FILE" ]; then
            echo "❌ 错误: 过滤后的域名列表为空！"
            exit 1
          fi

          echo "🚀 开始编译成 MRS 二进制文件 -> $OUTPUT_FILE"
          if ./mihomo rule-set compile -b domain "$TEMP_FILE" "$OUTPUT_FILE"; then
            echo "✅ 编译成功！"
            rm -f "$TEMP_FILE"
          else
            echo "❌ 编译失败！"
            rm -f "$TEMP_FILE"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 自动寻找编译出来的 mrs 文件并提交
          MRS_PATH=$(find . -name "category-pt.mrs" -print -quit)
          
          if [ -n "$MRS_PATH" ] && git status --porcelain "$MRS_PATH" | grep -q 'M\|A'; then
            git add "$MRS_PATH"
            git commit -m "chore: auto-compile category-pt.mrs [skip ci]"
            git push
            echo "🚀 编译后的 MRS 文件已成功推送到仓库！"
          else
            echo "ℹ️ MRS 文件无变动，跳过推送。"
          fi
