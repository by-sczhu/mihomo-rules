name: Compile Mihomo Rules

on:
  workflow_dispatch:
  push:
    paths:
      - 'mihomo-rules/rule/category-pt.list'

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Mihomo Core
        run: |
          echo "Downloading stable Mihomo Linux AMD64 core..."
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases | jq -r '[.[] | select(.prerelease==false)][0].assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | head -n 1)
          fi
          
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          gunzip -f mihomo.gz 2>/dev/null || mv mihomo.gz mihomo
          chmod +x mihomo
          ./mihomo -v

      - name: Preprocess and Compile Rules
        run: |
          INPUT_FILE="mihomo-rules/rule/category-pt.list"
          TEMP_FILE="mihomo-rules/rule/category-pt.tmp"
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          mkdir -p $(dirname "$OUTPUT_FILE")
          
          if [ -f "$INPUT_FILE" ]; then
            echo "🧹 正在清洗和格式化规则文件..."
            
            # 自动转换逻辑：
            # 1. 移除 Windows 换行符 (\r)
            # 2. 将开头的 +. 或 . 转换为 DOMAIN-SUFFIX,
            # 3. 过滤掉空行和纯空格行
            sed -e 's/\r//g' \
                -e 's/^[[:space:]]*+//g' \
                -e 's/^\.//g' \
                -e 's/^[[:space:]]*//g' \
                "$INPUT_FILE" | awk '
                NF && !/^#/ {
                    if ($0 !~ /^([A-Z0-9-]+),/) {
                        # 如果没有 DOMAIN-SUFFIX 等前缀，自动补上
                        sub(/^\./, "", $0);
                        print "DOMAIN-SUFFIX," $0
                    } else {
                        print $0
                    }
                }' > "$TEMP_FILE"

            echo "📝 格式化后的临时文件内容预览："
            cat "$TEMP_FILE"
            echo "----------------------------------------"

            echo "🚀 开始编译成 MRS 二进制文件..."
            # 使用 -b domain 明确指定这是一个域名类型的规则集
            if ./mihomo rule-set compile -b domain "$TEMP_FILE" "$OUTPUT_FILE"; then
              echo "💡 编译成功！"
              rm -f "$TEMP_FILE"
            else
              echo "❌ 编译失败！请查看下方日志中的错误提示。"
              rm -f "$TEMP_FILE"
              exit 1
            fi
          else
            echo "❌ 错误: 未找到输入文件 $INPUT_FILE"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          if git status --porcelain "$OUTPUT_FILE" | grep -q 'M\|A'; then
            git add "$OUTPUT_FILE"
            git commit -m "chore: auto-compile category-pt.mrs [skip ci]"
            git push
          else
            echo "ℹ️ 文件无变动，跳过推送。"
          fi
