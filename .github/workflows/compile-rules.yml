name: Compile Mihomo Rules to MRS

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master
    paths:
      - 'rules/*.list' # 仅当 rules 目录下的 .list 文件变动时触发
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取完整历史，否则无法进行 git pull/push

      - name: Download and Extract Mihomo Alpha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest alpha download URL..."
          URL=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases \
            | jq -r '[.[] | select(.tag_name == "meta-alpha")][0].assets[] | select(.name | /linux-amd64.*\.gz$/) | .browser_download_url')
          
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Fallback to default alpha link..."
            URL="https://github.com/MetaCubeX/mihomo/releases/download/meta-alpha/mihomo-linux-amd64-alpha-b8b1db7.gz"
          fi
          
          curl -L "$URL" -o mihomo.gz
          gunzip -c mihomo.gz > mihomo
          rm mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Compile .list to .mrs
        run: |
          mkdir -p rules
          for file in rules/*.list; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .list)
            
            if [[ "${filename,,}" == *"ip"* ]]; then
              ./mihomo rule-set compile --type ipcidr "$file" "rules/$filename.mrs"
            else
              ./mihomo rule-set compile --type domain "$file" "rules/$filename.mrs"
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -n "$(git status --porcelain rules/*.mrs)" ]; then
            git add rules/*.mrs
            git commit -m "chore: auto-compile rules to mrs [skip ci]"
            
            # 【核心修复】在 push 前先拉取远程最新更改，采用 rebase 模式防止分叉
            echo "Pulling latest changes from remote to prevent conflicts..."
            git pull --rebase origin main
            
            # 推送更改
            git push origin main
            echo "Changes pushed successfully."
          else
            echo "No changes detected in .mrs files. Skipping commit."
          fi
