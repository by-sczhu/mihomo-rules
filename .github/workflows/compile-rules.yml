name: Build Mihomo MRS

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - 'rules/**/*.list'

  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

concurrency:
  group: build-mrs
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Download Mihomo Alpha
        run: |
          set -e

          RELEASE_JSON=$(curl -s \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha)

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '
            .assets[]
            | select(
                .name
                | test("^mihomo-linux-amd64-alpha-.*\\.gz$")
              )
            | .browser_download_url
          ' | head -n1)

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Failed to find mihomo amd64 alpha package"
            exit 1
          fi

          echo "Download:"
          echo "$DOWNLOAD_URL"

          curl -L "$DOWNLOAD_URL" -o mihomo.gz

          gunzip -f mihomo.gz

          BIN=$(find . -maxdepth 1 -type f -name "mihomo-linux-amd64*" | head -n1)

          mv "$BIN" mihomo

          chmod +x mihomo

          ./mihomo version || true
          ./mihomo -h || true

      - name: Compile Rules
        shell: bash
        run: |
          set -e

          mapfile -t FILES < <(
            find rules -type f -name "*.list"
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No .list files found"
            exit 0
          fi

          echo "Found ${#FILES[@]} rule files"

          for INPUT in "${FILES[@]}"
          do
            NAME=$(basename "$INPUT" .list)
            DIR=$(dirname "$INPUT")

            CLEAN="${DIR}/${NAME}.clean"
            OUTPUT="${DIR}/${NAME}.mrs"

            echo "================================"
            echo "Processing: $INPUT"

            if [[ "${NAME,,}" =~ (ip|cidr) ]]
            then
              TYPE="ipcidr"

              awk '
              NF && !/^#/ {
                gsub(/\r/,"")
                gsub(/^[ \t]+/,"")
                print
              }' "$INPUT" > "$CLEAN"

            else
              TYPE="domain"

              awk '
              NF && !/^#/ {
                gsub(/\r/,"")

                sub(/^DOMAIN-SUFFIX,/,"")
                sub(/^DOMAIN,/,"")
                sub(/^DOMAIN-KEYWORD,/,"")

                sub(/^\+/,"")

                if(length($0)>0)
                  print
              }' "$INPUT" > "$CLEAN"
            fi

            if [ ! -s "$CLEAN" ]; then
              echo "Skip empty file"
              rm -f "$CLEAN"
              continue
            fi

            echo "Compile type: $TYPE"

            if ./mihomo convert-ruleset \
                "$TYPE" \
                text \
                "$CLEAN" \
                "$OUTPUT"
            then
              echo "Success"
            else
              echo "Compile failed"

              echo "========== Mihomo Help =========="
              ./mihomo -h || true

              echo "========== Convert Help =========="
              ./mihomo convert-ruleset -h || true

              exit 1
            fi

            rm -f "$CLEAN"

            ls -lh "$OUTPUT"
          done

      - name: Commit MRS
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "chore: update mrs files"

          git pull --rebase origin "${GITHUB_REF_NAME}"

          git push origin "${GITHUB_REF_NAME}"
