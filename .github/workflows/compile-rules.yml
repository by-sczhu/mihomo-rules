name: Compile Mihomo Rules

on:
  workflow_dispatch:
  push:
    paths:
      - 'mihomo-rules/rule/category-pt.list'

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Mihomo Core
        run: |
          echo "🚀 正在下载固定版本的稳定 Mihomo 内核..."
          # 使用 MetaCubeX 官方固定的二进制包（避免 API 限制导致获取不到下载链接）
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz"
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          
          echo "Extracting Mihomo core..."
          gunzip -f mihomo.gz
          mv mihomo-linux-amd64* mihomo 2>/dev/null || true
          chmod +x mihomo
          
          echo "----------------------------------------"
          echo "验证 Mihomo 内核是否工作正常："
          ./mihomo -v
          echo "----------------------------------------"

      - name: Preprocess and Compile Rules
        run: |
          INPUT_FILE="mihomo-rules/rule/category-pt.list"
          # 将临时文件后缀保持为 .list，防止编译器拒收
          TEMP_FILE="mihomo-rules/rule/category-pt.clean.list"
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          mkdir -p $(dirname "$OUTPUT_FILE")
          
          if [ -f "$INPUT_FILE" ]; then
            echo "🧹 正在将输入文件清洗为纯域名格式..."
            
            # 精准提取纯域名，剥离一切杂质
            awk '
            NF && !/^#/ {
                gsub(/\r/, "");
                sub(/^[[:space:]]*/, "");
                sub(/^(DOMAIN-SUFFIX|DOMAIN|DOMAIN-KEYWORD)[,.[[:space:]]]*/, "");
                sub(/^\+/, "");
                sub(/^\./, "");
                if ($0 != "") {
                    print $0
                }
            }' "$INPUT_FILE" > "$TEMP_FILE"

            echo "📝 准备送入编译器的纯域名列表预览："
            echo "----------------------------------------"
            cat "$TEMP_FILE"
            echo "----------------------------------------"

            echo "🚀 开始编译成 MRS 二进制文件..."
            # 使用 -b domain 编译规范命名的 .list 文件
            if ./mihomo rule-set compile -b domain "$TEMP_FILE" "$OUTPUT_FILE"; then
              echo "✅ 编译成功！"
              rm -f "$TEMP_FILE"
            else
              echo "❌ 编译失败！"
              rm -f "$TEMP_FILE"
              exit 1
            fi
          else
            echo "❌ 错误: 未找到输入文件 $INPUT_FILE"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          if git status --porcelain "$OUTPUT_FILE" | grep -q 'M\|A'; then
            git add "$OUTPUT_FILE"
            git commit -m "chore: auto-compile category-pt.mrs [skip ci]"
            git push
          else
            echo "ℹ️ 文件无变动，跳过推送。"
          fi
