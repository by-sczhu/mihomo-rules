name: Compile Mihomo Rules to MRS

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master
    paths:
      - 'rules/*.list' # 仅当 rules 目录下的 .list 文件变动时触发
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Extract Mihomo Alpha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching latest alpha download URL..."
          
          # 替换为更兼容的 contains 和 endswith，彻底解决 jq 的斜杠正则解析报错
          URL=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases \
            | jq -r '[.[] | select(.tag_name == "meta-alpha")][0].assets[] | select(.name | contains("linux-amd64") and endswith(".gz")) | .browser_download_url')
          
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "Fallback to default alpha link..."
            URL="https://github.com/MetaCubeX/mihomo/releases/download/meta-alpha/mihomo-linux-amd64-alpha-b8b1db7.gz"
          fi
          
          echo "Downloading from: $URL"
          curl -L "$URL" -o mihomo.gz
          gunzip -c mihomo.gz > mihomo
          rm mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Compile .list to .mrs
        run: |
          mkdir -p rules
          for file in rules/*.list; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .list)
            
            if [[ "${filename,,}" == *"ip"* ]]; then
              ./mihomo rule-set compile --type ipcidr "$file" "rules/$filename.mrs"
            else
              ./mihomo rule-set compile --type domain "$file" "rules/$filename.mrs"
            fi
          done

      - name: Auto Commit and Push MRS Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-compile rules to mrs [skip ci]"
          file_pattern: 'rules/*.mrs'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
