name: Build Mihomo MRS

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - 'rules/**/*.list'

  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

concurrency:
  group: mrs-build
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Download Latest Mihomo Alpha
        run: |
          set -e

          RELEASE_JSON=$(curl -s \
            https://api.github.com/repos/MetaCubeX/mihomo/releases)

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '
            map(select(.prerelease == true))[0]
            .assets[]
            | select(.name | test("linux-amd64.*\\.gz$"))
            | .browser_download_url
          ')

          echo "$DOWNLOAD_URL"

          curl -L "$DOWNLOAD_URL" -o mihomo.gz

          gunzip -f mihomo.gz

          mv mihomo-linux-amd64* mihomo

          chmod +x mihomo

          ./mihomo -v

      - name: Compile Rules
        shell: bash
        run: |
          set -e

          mapfile -t FILES < <(
            find rules \
              -type f \
              -name "*.list"
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No rules found"
            exit 0
          fi

          echo "Found ${#FILES[@]} files"

          for INPUT in "${FILES[@]}"
          do
            NAME=$(basename "$INPUT" .list)
            DIR=$(dirname "$INPUT")

            CLEAN="${DIR}/${NAME}.clean"
            OUTPUT="${DIR}/${NAME}.mrs"

            echo "================================"
            echo "Processing $INPUT"

            if [[ "${NAME,,}" =~ (ip|cidr) ]]
            then
              TYPE="ipcidr"

              awk '
              NF && !/^#/ {
                gsub(/\r/,"")
                gsub(/^[ \t]+/,"")
                print
              }' "$INPUT" > "$CLEAN"

            else
              TYPE="domain"

              awk '
              NF && !/^#/ {
                gsub(/\r/,"")

                sub(/^DOMAIN-SUFFIX,/,"")
                sub(/^DOMAIN,/,"")
                sub(/^DOMAIN-KEYWORD,/,"")

                sub(/^\+/,"")

                if(length($0)>0)
                  print
              }' "$INPUT" > "$CLEAN"
            fi

            if [ ! -s "$CLEAN" ]
            then
              echo "Empty after cleanup"
              rm -f "$CLEAN"
              continue
            fi

            echo "Convert => ${TYPE}"

            ./mihomo convert-ruleset \
              "${TYPE}" \
              text \
              "$CLEAN" \
              "$OUTPUT"

            rm -f "$CLEAN"

            ls -lh "$OUTPUT"
          done

      - name: Commit
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes"
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email \
            41898282+github-actions[bot]@users.noreply.github.com

          git add rules/*.mrs
          git add rules/**/*.mrs

          git commit -m "chore: update mrs"

          git pull --rebase origin "${GITHUB_REF_NAME}"

          git push origin "${GITHUB_REF_NAME}"
