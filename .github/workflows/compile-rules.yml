name: Build Mihomo MRS

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - 'rules/**/*.list'

  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Download latest Mihomo
        run: |
          set -e

          TAG=$(curl -s \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | jq -r '.tag_name')

          echo "Latest Mihomo: $TAG"

          URL="https://github.com/MetaCubeX/mihomo/releases/download/${TAG}/mihomo-linux-amd64-${TAG}.gz"

          curl -L "$URL" -o mihomo.gz

          gunzip -f mihomo.gz

          mv mihomo-linux-amd64* mihomo

          chmod +x mihomo

          ./mihomo -v

      - name: Compile all rules
        shell: bash
        run: |
          set -e

          mkdir -p rules

          mapfile -t FILES < <(
            find rules \
              -type f \
              -name "*.list"
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No .list files found"
            exit 0
          fi

          echo "Found ${#FILES[@]} rule files"

          for INPUT in "${FILES[@]}"
          do
            BASENAME=$(basename "$INPUT" .list)
            DIRNAME=$(dirname "$INPUT")

            TMP="${DIRNAME}/${BASENAME}.tmp"
            OUTPUT="${DIRNAME}/${BASENAME}.mrs"

            echo "--------------------------------"
            echo "Processing: $INPUT"

            if [[ "${BASENAME,,}" =~ (ip|cidr) ]]
            then
              TYPE="ipcidr"

              awk '
              NF && !/^#/ {
                gsub(/\r/,"")
                gsub(/^[ \t]+/,"")
                print
              }' "$INPUT" > "$TMP"

            else
              TYPE="domain"

              awk '
              NF && !/^#/ {
                gsub(/\r/,"")

                sub(/^DOMAIN-SUFFIX,/,"")
                sub(/^DOMAIN,/,"")
                sub(/^DOMAIN-KEYWORD,/,"")
                sub(/^\+/,"")

                if(length($0)>0)
                  print
              }' "$INPUT" > "$TMP"
            fi

            if [ ! -s "$TMP" ]
            then
              echo "Skip empty rule file"
              rm -f "$TMP"
              continue
            fi

            echo "Compiling as ${TYPE}"

            ./mihomo rule-set compile \
              --type "${TYPE}" \
              "${TMP}" \
              "${OUTPUT}"

            rm -f "$TMP"

            ls -lh "$OUTPUT"
          done

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/**/*.mrs rules/*.mrs || true

          git commit -m "chore: update mrs files"

          git pull --rebase origin \
            "${GITHUB_REF_NAME}"

          git push origin \
            "${GITHUB_REF_NAME}"
