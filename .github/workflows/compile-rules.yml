name: Compile All Mihomo Rules to MRS (Zero-Block Safe Mode)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'rules/*.list'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set Up Verified Mihomo Core
        run: |
          echo "🚀 正在下载经典稳定版 Mihomo 内核..."
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz"
          
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          gunzip -f mihomo.gz
          mv mihomo-linux-amd64* mihomo 2>/dev/null || true
          chmod +x mihomo
          
          echo "----------------------------------------"
          echo "验证内核状态："
          ./mihomo -v
          echo "----------------------------------------"

      - name: Preprocess Rules via Python (Zero-Escape Safe Mode)
        shell: python
        run: |
          import os
          import re

          print("🔍 正在启动 Python 安全清洗矩阵...")
          rules_dir = "rules"
          if not os.path.exists(rules_dir):
              os.makedirs(rules_dir)

          files = [os.path.join(rules_dir, f) for f in os.listdir(rules_dir) if f.endswith('.list') and not f.endswith('.clean.list')]
          
          if not files:
              print("ℹ️ rules/ 目录下未找到任何需要转换的 .list 文件。")
              exit(0)

          print(f"✅ 找到 {len(files)} 个目标规则文件，启动严格清洗...")
          print("-" * 40)

          for input_file in files:
              base_name = os.path.splitext(os.path.basename(input_file))[0]
              temp_file = os.path.join(rules_dir, f"{base_name}.clean.list")
              
              print(f"📁 正在处理: {input_file}")
              is_ip_rule = "ip" in base_name.lower()
              cleaned_lines = []

              with open(input_file, 'r', encoding='utf-8', errors='ignore') as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue
                      
                      if is_ip_rule:
                          match = re.search(r'([0-9a-fA-F:\.]+/[0-9]+)', line)
                          if match:
                              cleaned_lines.append(match.group(1))
                      else:
                          line = re.sub(r'^(DOMAIN-SUFFIX|DOMAIN|DOMAIN-KEYWORD)[,.\s]*', '', line, flags=re.IGNORECASE)
                          line = line.lstrip('+')
                          if re.match(r'^\.?[a-z0-9][-a-z0-9]*(\.[a-z0-9][-a-z0-9]*)*$', line, re.IGNORECASE):
                              cleaned_lines.append(line.lower())

              if not cleaned_lines:
                  print(f"   ⚠️ 警告: {base_name} 清洗后没有合法规则，跳过。")
                  continue

              with open(temp_file, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(cleaned_lines) + '\n')
              
              print(f"   ✅ 清洗完成。有效规则: {len(cleaned_lines)} 条。")
              print("-" * 40)

      - name: Batch Compile Rules via Mihomo CLI Sandbox (No-Port Block)
        run: |
          echo "🚀 创建极其微型的临时假配置，强制将所有可能阻塞的网络端口彻底禁用..."
          
          # 创建完全关闭所有物理端口监听的临时文件
          cat <<EOF > dummy-config.yaml
          mode: rule
          port: 0
          socks-port: 0
          redir-port: 0
          mixed-port: 0
          tproxy-port: 0
          allow-lan: false
          log-level: silent
          EOF

          echo "🚀 启动稳定版内核进行二进制安全压制..."
          shopt -s nullglob
          CLEAN_FILES=(rules/*.clean.list)
          
          for TEMP_FILE in "${CLEAN_FILES[@]}"; do
            BASE_NAME=$(basename "$TEMP_FILE" .clean.list)
            OUTPUT_FILE="rules/$BASE_NAME.mrs"
            
            if [[ "${BASE_NAME,,}" == *"ip"* ]]; then
              RULE_TYPE="ipcidr"
            else
              RULE_TYPE="domain"
            fi
            
            echo "⚡ 编译中: $TEMP_FILE -> $OUTPUT_FILE"
            
            # 【终极修正点】根据日志中 Usage 的官方规范，将原来的 -c 改为唯一的标准参数 -f
            if ./mihomo -f dummy-config.yaml cli rule-set compile "$RULE_TYPE" "$TEMP_FILE" "$OUTPUT_FILE"; then
              echo "   🎉 成功生成二进制 MRS 文件!"
            else
              echo "   ❌ 失败: 编译过程中出错！"
              rm -f rules/*.clean.list dummy-config.yaml
              exit 1
            fi
          done
          
          rm -f rules/*.clean.list dummy-config.yaml
          echo "----------------------------------------"

      - name: Auto Commit and Push MRS Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -n "$(git status --porcelain rules/*.mrs)" ]; then
            git add rules/*.mrs
            git commit -m "chore: auto-compile rules to mrs [skip ci]"
            
            CURRENT_BRANCH=$(git branch --show-current)
            git pull --rebase origin "$CURRENT_BRANCH"
            git push origin "$CURRENT_BRANCH"
            echo "🚀 所有 MRS 二进制规则文件已成功推送到仓库！"
          else
            echo "ℹ️ 没有检测到 MRS 文件变动，跳过推送。"
          fi
