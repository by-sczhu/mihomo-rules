name: Compile Mihomo Rules to MRS

on:
  push:
    branches:
      - main  # 如果你的主分支叫 master，请改为 master
    paths:
      - 'rules/*.list' # 仅当 rules 目录下的 .list 文件变动时触发
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Mihomo Alpha (Smart Safe Mode)
        run: |
          echo "Downloading latest alpha from fixed endpoint..."
          # 直接下载官方永久固定的最新 Alpha 包，彻底避开 API 超时和 jq 限制
          curl -L "https://github.com/MetaCubeX/mihomo/releases/download/meta-alpha/mihomo-linux-amd64" -o mihomo_download
          
          # 智能判断下载下来的是二进制文件还是二进制压缩包
          if file mihomo_download | grep -q "gzip compressed data"; then
            echo "Detected GZIP format. Extracting..."
            mv mihomo_download mihomo.gz
            gunzip -c mihomo.gz > mihomo
            rm -f mihomo.gz
          else
            echo "Detected Direct Binary format."
            mv mihomo_download mihomo
          fi
          
          # 赋予权限并验证
          chmod +x mihomo
          ./mihomo -v

      - name: Compile .list to .mrs
        run: |
          mkdir -p rules
          for file in rules/*.list; do
            [ -e "$file" ] || continue
            filename=$(basename "$file" .list)
            echo "Compiling $file ..."
            
            if [[ "${filename,,}" == *"ip"* ]]; then
              ./mihomo rule-set compile --type ipcidr "$file" "rules/$filename.mrs"
            else
              ./mihomo rule-set compile --type domain "$file" "rules/$filename.mrs"
            fi
          done

      - name: Auto Commit and Push MRS Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-compile rules to mrs [skip ci]"
          file_pattern: 'rules/*.mrs'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
