name: Compile All Mihomo Rules

on:
  workflow_dispatch:
  push:
    # 仅当 rules 目录下的 .list 文件变动时才触发，避免无关变动浪费 Actions 额度
    paths:
      - 'rules/*.list'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 显式声明赋予 GitHub 机器人写入仓库的权限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Mihomo Core
        run: |
          echo "🚀 正在下载固定版本的稳定 Mihomo 内核..."
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz"
          
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          gunzip -f mihomo.gz
          mv mihomo-linux-amd64* mihomo 2>/dev/null || true
          chmod +x mihomo
          
          echo "----------------------------------------"
          echo "验证 Mihomo 内核是否工作正常："
          ./mihomo -v
          echo "----------------------------------------"

      - name: Preprocess and Batch Compile Rules
        run: |
          echo "🔍 正在扫描 rules/ 目录下的 .list 文件..."
          
          # 直接定位到 rules 文件夹，确保只处理该目录下的标准规则文件
          mkdir -p rules
          
          # 使用 shopt 确保在没有匹配到文件时不会把 *.list 当作字符串处理
          shopt -s nullglob
          LIST_FILES=(rules/*.list)
          
          # 过滤掉可能存在的临时文件
          LIST_FILES=(${LIST_FILES[@]/%*.clean.list/})
          
          if [ ${#LIST_FILES[@]} -eq 0 ]; then
            echo "ℹ️ rules/ 目录下未找到任何需要转换的 .list 文件。"
            exit 0
          fi
          
          echo "✅ 找到 ${#LIST_FILES[@]} 个目标规则文件，开始处理..."
          echo "----------------------------------------"
          
          for INPUT_FILE in "${LIST_FILES[@]}"; do
            # 严格基于 rules 目录提取文件名
            BASE_NAME=$(basename "$INPUT_FILE" .list)
            
            TEMP_FILE="rules/$BASE_NAME.clean.list"
            OUTPUT_FILE="rules/$BASE_NAME.mrs"
            
            echo "📁 正在处理: $INPUT_FILE"
            
            # 【智能识别类型】根据 rules/ 下的文件名是否包含 ip 智能切换清洗规则与编译类型
            if [[ "${BASE_NAME,,}" == *"ip"* ]]; then
              RULE_TYPE="ipcidr"
              echo "   🏷️ 识别结果: IP 规则 (ipcidr)"
              
              awk '
              NF && !/^#/ {
                  gsub(/\r/, "");
                  sub(/^[[:space:]]*/, "");
                  if ($0 ~ /^[0-9a-fA-F:\.]+\/[0-9]+$/) {
                      print $0
                  }
              }' "$INPUT_FILE" > "$TEMP_FILE" || true
              
            else
              RULE_TYPE="domain"
              echo "   🏷️ 识别结果: 域名规则 (domain)"
              
              awk '
              NF && !/^#/ {
                  gsub(/\r/, "");
                  sub(/^[[:space:]]*/, "");
                  sub(/^(DOMAIN-SUFFIX|DOMAIN|DOMAIN-KEYWORD)[,.[[:space:]]]*/, "");
                  sub(/^\+/, "");
                  if ($0 != "") {
                      print $0
                  }
              }' "$INPUT_FILE" | grep -Ei '^\.?[a-z0-9][-a-z0-9]*(\.[a-z0-9][-a-z0-9]*)*$' > "$TEMP_FILE" || true
            fi
            
            if [ ! -s "$TEMP_FILE" ]; then
              echo "   ⚠️ 警告: 过滤清洗后无有效规则内容，跳过编译此文件。"
              rm -f "$TEMP_FILE"
              echo "----------------------------------------"
              continue
            fi
            
            # 【核心修复版命令】严格遵循规范：rule-set compile <类型> <输入> <输出>
            echo "   🚀 正在编译为 MRS -> $OUTPUT_FILE"
            if ./mihomo rule-set compile "$RULE_TYPE" "$TEMP_FILE" "$OUTPUT_FILE"; then
              echo "   ✅ 成功编译!"
            else
              echo "   ❌ 失败: 编译过程中出错！"
              rm -f "$TEMP_FILE"
              exit 1
            fi
            
            rm -f "$TEMP_FILE"
            echo "----------------------------------------"
          done
          echo "🎉 rules/ 目录下的所有文件已全部处理完毕。"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 仅针对 rules/*.mrs 进行状态检查与提交，非常干净
          if [ -n "$(git status --porcelain rules/*.mrs)" ]; then
            git add rules/*.mrs
            git commit -m "chore: auto-compile rules in rules/ to mrs [skip ci]"
            
            # 自动适配 main 或 master 分支拉取防冲突
            git pull --rebase origin main || git pull --rebase origin master
            git push
            echo "🚀 rules/ 目录下的 MRS 文件已成功同步推送到仓库！"
          else
            echo "ℹ️ MRS 文件均无变动，跳过推送步骤。"
          fi
