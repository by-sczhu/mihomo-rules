name: Compile Mihomo Rules

on:
  workflow_dispatch:
  push:
    paths:
      - 'mihomo-rules/rule/category-pt.list'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Mihomo Core
        run: |
          echo "🚀 正在下载固定版本的稳定 Mihomo 内核..."
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.gz"
          
          curl -L -o mihomo.gz "$DOWNLOAD_URL"
          gunzip -f mihomo.gz
          mv mihomo-linux-amd64* mihomo 2>/dev/null || true
          chmod +x mihomo
          
          echo "----------------------------------------"
          echo "验证 Mihomo 内核是否工作正常："
          ./mihomo -v
          echo "----------------------------------------"

      - name: Preprocess and Compile Rules
        run: |
          INPUT_FILE="mihomo-rules/rule/category-pt.list"
          TEMP_FILE="mihomo-rules/rule/category-pt.clean.list"
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          mkdir -p $(dirname "$OUTPUT_FILE")
          
          if [ -f "$INPUT_FILE" ]; then
            echo "🧹 启动严格域名过滤与清洗..."
            
            # 1. 移除常见前缀、符号和回车符
            # 2. 核心大招：使用 grep 强制只保留符合标准域名格式的行 (字母、数字、减号、点)
            #    这一步能彻底干掉所有因为空格、隐藏字符、前缀没删干净导致的编译报错
            sed -e 's/\r//g' \
                -e 's/^[[:space:]]*//g' \
                -e 's/^DOMAIN,//g' \
                -e 's/^DOMAIN-SUFFIX,//g' \
                -e 's/^DOMAIN-KEYWORD,//g' \
                -e 's/^+//g' \
                -e 's/^\.//g' \
                "$INPUT_FILE" | grep -Ei '^[a-z0-9][-a-z0-9]*(\.[a-z0-9][-a-z0-9]*)+$' > "$TEMP_FILE" || true

            echo "📝 净化后的域名列表预览（不符合域名规范的行已被自动剔除）："
            echo "----------------------------------------"
            cat "$TEMP_FILE"
            echo "----------------------------------------"

            # 检查清洗后是否有有效内容
            if [ ! -s "$TEMP_FILE" ]; then
              echo "❌ 错误: 过滤后的域名列表为空，请检查原始文件内容！"
              exit 1
            fi

            echo "🚀 开始编译成 MRS 二进制文件..."
            if ./mihomo rule-set compile -b domain "$TEMP_FILE" "$OUTPUT_FILE"; then
              echo "✅ 编译成功！"
              rm -f "$TEMP_FILE"
            else
              echo "❌ 编译失败！"
              rm -f "$TEMP_FILE"
              exit 1
            fi
          else
            echo "❌ 错误: 未找到输入文件 $INPUT_FILE"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          OUTPUT_FILE="mihomo-rules/rule/category-pt.mrs"
          
          if git status --porcelain "$OUTPUT_FILE" | grep -q 'M\|A'; then
            git add "$OUTPUT_FILE"
            git commit -m "chore: auto-compile category-pt.mrs [skip ci]"
            git push
          else
            echo "ℹ️ 文件无变动，跳过推送。"
          fi
