name: Build Mihomo MRS

on:
workflow_dispatch:

push:
branches:
- main
- master
paths:
- 'rules/**/*.list'
- 'rules/*.list'

schedule:
- cron: '0 20 * * *'

permissions:
contents: write

concurrency:
group: build-mrs
cancel-in-progress: true

jobs:
build:
if: github.actor != 'github-actions[bot]'
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Install Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y curl jq

  - name: Download Mihomo Alpha
    run: |
      set -e

      DOWNLOAD_URL=$(
        curl -s \
        https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha |
        jq -r '
          .assets[]
          | select(.name | test("^mihomo-linux-amd64-alpha-.*\\.gz$"))
          | .browser_download_url
        ' | head -n1
      )

      echo "Download URL:"
      echo "$DOWNLOAD_URL"

      [ -n "$DOWNLOAD_URL" ]

      FILE_NAME=$(basename "$DOWNLOAD_URL")
      BIN_NAME="${FILE_NAME%.gz}"

      curl -L "$DOWNLOAD_URL" -o "$FILE_NAME"

      gunzip -f "$FILE_NAME"

      chmod +x "$BIN_NAME"

      mv "$BIN_NAME" mihomo

      echo "========== VERSION =========="
      ./mihomo version || ./mihomo -v || true

      echo "========== HELP =========="
      ./mihomo -h || true

  - name: Compile Rules
    shell: bash
    run: |
      set -e

      mapfile -t FILES < <(
        find rules -type f -name "*.list"
      )

      if [ ${#FILES[@]} -eq 0 ]; then
        echo "No .list files found"
        exit 0
      fi

      echo "Found ${#FILES[@]} files"

      for INPUT in "${FILES[@]}"
      do
        NAME=$(basename "$INPUT" .list)
        DIR=$(dirname "$INPUT")

        CLEAN="${DIR}/${NAME}.clean"
        OUTPUT="${DIR}/${NAME}.mrs"

        echo "================================"
        echo "Processing: $INPUT"

        if [[ "${NAME,,}" =~ (ip|cidr) ]]; then
          TYPE="ipcidr"

          awk '
          NF && !/^#/ {
            gsub(/\r/,"")
            gsub(/^[ \t]+/,"")
            print
          }' "$INPUT" > "$CLEAN"

        else
          TYPE="domain"

          awk '
          NF && !/^#/ {
            gsub(/\r/,"")

            sub(/^DOMAIN-SUFFIX,/,"")
            sub(/^DOMAIN,/,"")
            sub(/^DOMAIN-KEYWORD,/,"")
            sub(/^\+/,"")

            if(length($0)>0)
              print
          }' "$INPUT" > "$CLEAN"
        fi

        if [ ! -s "$CLEAN" ]; then
          echo "Skip empty file"
          rm -f "$CLEAN"
          continue
        fi

        echo "Compiling type: $TYPE"

        ./mihomo convert-ruleset \
          "$TYPE" \
          text \
          "$CLEAN" \
          "$OUTPUT"

        rm -f "$CLEAN"

        ls -lh "$OUTPUT"
      done

  - name: Commit Changes
    run: |
      if [ -z "$(git status --porcelain)" ]; then
        echo "No changes"
        exit 0
      fi

      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add .

      git commit -m "chore: update mrs files"

      git pull --rebase origin "${GITHUB_REF_NAME}"

      git push origin "${GITHUB_REF_NAME}"
