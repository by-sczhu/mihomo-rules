name: Build category-pt.mrs

on:
workflow_dispatch:

push:
paths:
- "rules/category-pt.list"

schedule:
- cron: "0 18 * * *"

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v5

  - name: Install Mihomo
    run: |
      curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha \
      | grep browser_download_url \
      | grep linux-amd64-compatible.gz \
      | head -n 1 \
      | cut -d '"' -f 4 \
      | wget -qi - -O mihomo.gz

      gunzip mihomo.gz

      chmod +x mihomo

      sudo mv mihomo /usr/local/bin/mihomo

      mihomo -v

  - name: Convert category-pt.list
    run: |
      mkdir -p rules

      sed \
        -e 's/^\+\.//' \
        -e '/^$/d' \
        -e '/^#/d' \
        rules/category-pt.list \
        > category-pt-domain.txt

      mihomo convert-ruleset \
        domain \
        text \
        category-pt-domain.txt \
        rules/category-pt.mrs

      ls -lh rules/category-pt.mrs

  - name: Commit and Push
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

      git add rules/category-pt.mrs

      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "Update category-pt.mrs"
        git push
      fi
```
