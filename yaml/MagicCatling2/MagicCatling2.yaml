# =================================================
#                 Magic Catling2 优化配置
#                               -- Mihomo v1.19.20+ 
# =================================================

# ====================全局配置模块==================
port: 7890
proxies:

# ==================== 锚点配置 ====================
# 锚点 -  代理提供者模板 - 订阅源基础配置
BasePD: &BasePD {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.google.com/generate_204', interval: 300}, filter: '^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'}

# 锚点- 自动测速策略组基础配置
BaseUT: &BaseUT {type: url-test, interval: 60, tolerance: 20, lazy: true, url: 'http://www.apple.com/library/test/success.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: true, include-all: true}
# 锚点 - 故障转移策略组基础配置
BaseFB: &BaseFB {type: fallback, interval: 60, lazy: true, url: 'http://www.apple.com/library/test/success.html', disable-udp: false, timeout: 2000, max-failed-times: 3, hidden: false}
# 锚点 - 负载均衡策略组基础配置
BaseCH: &BaseCH {type: load-balance, interval: 60, lazy: true, url: 'http://www.apple.com/library/test/success.html', disable-udp: false, strategy: consistent-hashing, timeout: 2000, max-failed-times: 3, hidden: true, include-all: true}
# 锚点 - 负载均衡策略组基础配置
BaseCR: &BaseCR {type: load-balance, interval: 60, lazy: true, url: 'http://www.apple.com/library/test/success.html', disable-udp: false, strategy: round-robin, timeout: 2000, max-failed-times: 3, hidden: true, include-all: true}

# 锚点 -  节点筛选正则表达式 - 基于地理位置和关键词过滤
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(排除1|排除2|5x)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(排除1|排除2|5x)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(排除1|排除2|5x)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|5x)).*$'
FilterOT: &FilterOT '^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW))'
FilterAL: &FilterAL '^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'

# 锚点 -  策略组代理列表模板 - 预定义的代理节点优先级排序
SelectDC: &SelectDC {type: select, proxies: [DIRECT, 默认代理]}
SelectFN: &SelectFN {type: select, proxies: [默认代理, 其它自选, DIRECT]}
SelectFB: &SelectFB {type: select, proxies: [故障转移, 智能故转, 香港策略, 台湾策略, 新加坡策略, 日本策略, 美国策略, 其它自选, DIRECT]}
SelectAI: &SelectAI {type: select, proxies: [智能故转, 默认代理, 故障转移, 香港策略, 台湾策略, 新加坡策略, 日本策略, 美国策略, 其它自选, DIRECT]}
SelectPY: &SelectPY {type: select, proxies: [默认代理, 故障转移, 智能故转, 香港策略, 台湾策略, 新加坡策略, 日本策略, 美国策略, 其它自选, DIRECT]}

# 锚点 - 规则集行为模板
DomainMrs: &DomainMrs {type: http, interval: 86400, behavior: domain, format: mrs}
IPcidrMrs: &IPcidrMrs {type: http, interval: 86400, behavior: ipcidr, format: mrs}
# ==================== 锚点配置结束 ==================

# ==================== 代理提供者 ====================
# 注意：请提供您的机场订阅链接，每个链接一行，并为每个机场命名，末尾的[MC][BK]为每个节点添加机场名称前缀，可自定义
proxy-providers:
  # 主订阅源 - 节点集合，使用时请修改
  MC: {<<: *BasePD, url: 'http://10.0.0.6:3001/***/collection/MC', override: {additional-prefix: '[MC] '}}
  # 备用订阅源 - 次优节点集合，使用时请修改
  BK: {<<: *BasePD, url: 'http://10.0.0.6:3001/***/collection/BK', override: {additional-prefix: '[BK] '}}

