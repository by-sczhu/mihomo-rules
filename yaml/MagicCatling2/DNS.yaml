# Fake ip --1
dns:
  enable: true                          # 启用 DNS 模块
  listen: :23453                        # DNS 服务监听地址和端口（本地 DNS 服务端口）
  ipv6: true                            # 启用 IPv6 DNS 解析支持
  cache-algorithm: arc                  # DNS 缓存算法，使用 ARC（自适应替换缓存）算法
  enhanced-mode: fake-ip                # DNS 增强模式，使用 fake-ip（虚假 IP）模式，而非 redir-host
  fake-ip-range: 198.18.0.1/16          # IPv4 fake-ip 地址池范围
  fake-ip-range6: fd6c:91f3:2b7a::/48   # IPv6 fake-ip 地址池范围
  fake-ip-filter-mode: rule             # fake-ip 过滤模式为基于规则（rule），命中下方规则的域名走真实 IP
  fake-ip-filter:                       # fake-ip 白名单（这些域名不使用 fake-ip，而是返回真实 IP）
    - RULE-SET,private,real-ip          # 私有/局域网相关规则集，使用真实 IP
    - RULE-SET,apple-cn,real-ip         # 苹果中国大陆相关服务规则集，使用真实 IP
    - RULE-SET,category-direct,real-ip  # 直连类域名规则集，使用真实 IP
    - RULE-SET,category-pt,real-ip      # PT（私有种子站/BT 相关）规则集，使用真实 IP
    - RULE-SET,cn,real-ip               # 中国大陆域名规则集，使用真实 IP
  proxy-server-nameserver:              # 用于解析代理服务器节点域名本身的 DNS 服务器
    - https://223.5.5.5/dns-query       # 阿里 DNS（DoH）
    - https://119.29.29.29/dns-query    # 腾讯 DNSPod（DoH）
  nameserver:                           # 默认上游 DNS 服务器（用于解析其他普通域名请求）
    - https://223.5.5.5/dns-query       # 阿里 DNS（DoH）
    - https://119.29.29.29/dns-query    # 腾讯 DNSPod（DoH）

# Fake ip --1
dns:
  enable: true
  listen: :23453
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,private,real-ip
    - RULE-SET,self-built,real-ip
    - RULE-SET,apple-cn,real-ip
    - RULE-SET,category-pt,real-ip
    - RULE-SET,cloudflare-cn,real-ip
    - RULE-SET,microsoft-cn,real-ip
    - RULE-SET,cn,real-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# Fake ip --2
dns:
  enable: true
  listen: :23453
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,private,real-ip
    - RULE-SET,self-built,real-ip
    - RULE-SET,apple-cn,real-ip
    - RULE-SET,category-pt,real-ip
    - RULE-SET,microsoft-cn,real-ip
    - RULE-SET,cn,real-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:self-built":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:apple-cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:geolocation-!cn":
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    
# Fake ip --3
 dns:
  enable: true
  listen: :23453
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - RULE-SET,private,real-ip
    - +.lan
    - +.local
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:cn,private":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:geolocation-!cn":
      - https://1.0.0.1/dns-query
      - https://8.8.4.4/dns-query
  nameserver:
    - https://1.0.0.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
