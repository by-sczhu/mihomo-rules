# Fake ip --1
dns:
  enable: true
  listen: :23453
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,private,real-ip
    - RULE-SET,self-built,real-ip
    - RULE-SET,apple-cn,real-ip
    - RULE-SET,category-pt,real-ip
    - RULE-SET,microsoft-cn,real-ip
    - RULE-SET,cn,real-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

# Fake ip --2
dns:
  enable: true
  listen: :23453
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,private,real-ip
    - RULE-SET,self-built,real-ip
    - RULE-SET,apple-cn,real-ip
    - RULE-SET,category-pt,real-ip
    - RULE-SET,microsoft-cn,real-ip
    - RULE-SET,cn,real-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:self-built":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:apple-cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:cn":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:geolocation-!cn":
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    
# Fake ip --3
 dns:
  enable: true
  listen: :23453
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - RULE-SET,private,real-ip
    - +.lan
    - +.local
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:cn,private":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:geolocation-!cn":
      - https://1.0.0.1/dns-query
      - https://8.8.4.4/dns-query
  nameserver:
    - https://1.0.0.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
